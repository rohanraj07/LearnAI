services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agent-network

  orchestrator:
    build:
      context: ../orchestrator
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agent-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  financial-profile-agent:
    build:
      context: ../agents/financial-profile-agent
      dockerfile: Dockerfile
    ports:
      - '8001:8001'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agent-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  market-simulation-agent:
    build:
      context: ../agents/market-simulation-agent
      dockerfile: Dockerfile
    ports:
      - '8002:8002'
