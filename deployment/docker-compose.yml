  evaluator-agent:
    build:
      context: ../agents/evaluator-agent
      dockerfile: Dockerfile
    ports:
      - '8007:8007'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agent-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8007/health']
      interval: 10s
      timeout: 5s
      retries: 5

  agent-bootstrap:
    image: curlimages/curl:8.6.0
    depends_on:
      orchestrator:
        condition: service_healthy
      financial-profile-agent:
        condition: service_healthy
      market-simulation-agent:
        condition: service_healthy
      portfolio-optimization-agent:
        condition: service_healthy
      tax-strategy-agent:
        condition: service_healthy
      risk-evaluation-agent:
        condition: service_healthy
      reviewer-agent:
        condition: service_healthy
      evaluator-agent:
        condition: service_healthy
    networks:
      - agent-network
    command: |
      sh -c '
      sleep 3
      curl -X POST http://orchestrator:8000/register \
        -H "Content-Type: application/json" \
        -d "{\"agentId\":\"financial-profile-agent\",\"baseUrl\":\"http://financial-profile-agent:8001\",\"capabilities\":[\"PROFILE_USER\"],\"version\":\"1.0.0\"}"
      curl -X POST http://orchestrator:8000/register \
        -H "Content-Type: application/json" \
        -d "{\"agentId\":\"market-simulation-agent\",\"baseUrl\":\"http://market-simulation-agent:8002\",\"capabilities\":[\"RUN_MONTE_CARLO\"],\"version\":\"1.0.0\"}"
      curl -X POST http://orchestrator:8000/register \
        -H "Content-Type: application/json" \
        -d "{\"agentId\":\"portfolio-optimization-agent\",\"baseUrl\":\"http://portfolio-optimization-agent:8003\",\"capabilities\":[\"OPTIMIZE_PORTFOLIO\"],\"version\":\"1.0.0\"}"
      curl -X POST http://orchestrator:8000/register \
        -H "Content-Type: application/json" \
        -d "{\"agentId\":\"tax-strategy-agent\",\"baseUrl\":\"http://tax-strategy-agent:8004\",\"capabilities\":[\"COMPUTE_TAX_STRATEGY\"],\"version\":\"1.0.0\"}"
      curl -X POST http://orchestrator:8000/register \
        -H "Content-Type: application/json" \
        -d "{\"agentId\":\"risk-evaluation-agent\",\"baseUrl\":\"http://risk-evaluation-agent:8005\",\"capabilities\":[\"EVALUATE_RISK\"],\"version\":\"1.0.0\"}"
      curl -X POST http://orchestrator:8000/register \
        -H "Content-Type: application/json" \
        -d "{\"agentId\":\"reviewer-agent\",\"baseUrl\":\"http://reviewer-agent:8006\",\"capabilities\":[\"REVIEW_STRATEGY\"],\"version\":\"1.0.0\"}"
      curl -X POST http://orchestrator:8000/register \
        -H "Content-Type: application/json" \
        -d "{\"agentId\":\"evaluator-agent\",\"baseUrl\":\"http://evaluator-agent:8007\",\"capabilities\":[\"EVALUATE_AND_RANK\"],\"version\":\"1.0.0\"}"
      echo "All agents registered"
      '
    restart: 'no'

  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
      args:
        ORCHESTRATOR_URL: http://orchestrator:8000
    ports:
      - '4200:4200'
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - agent-network
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8000

networks:
  agent-network:
    driver: bridge
